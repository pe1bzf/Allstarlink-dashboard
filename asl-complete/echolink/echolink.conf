; EchoLink configuratie — ROEPNAAM-L koppeling naar AllStarLink node NODENUMMER
; Vul hieronder uw eigen gegevens in / Fill in your own details below

[el0]
call = N0CALL-L
pwd = CHANGE_ME_PASSWORD
name = N0CALL to AllStarLink
qth = City, Country
email = youraddress@example.com
node = 0

; Locatie / Location (grid square)
lat = 0.00
lon = 0.00
freq = 0.0
tone = 0.0
power = 0
height = 0
gain = 0
dir = 0

; Welkomstbericht voor inkomende verbindingen / Welcome message for incoming connections
message = N0CALL AllStarLink Hub - Node NODENUMMER\nWelkom!

maxstns = 20
rtcptimeout = 10
recfile = /tmp/echolink_recorded.gsm

; Verbinden met ASL hub node / Connect to ASL hub node
astnode = NODENUMMER
context = radio-secure

; EchoLink directory servers
server1 = nasouth.echolink.org
server2 = naeast.echolink.org
server3 = servers.echolink.org
server4 = backup.echolink.org

; permit = *-*    ; alleen link/repeater nodes toestaan (schakel in indien gewenst)
; deny =          ; geblokkeerde roepnamen

#tryinclude "custom/echolink.conf"
